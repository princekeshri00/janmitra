<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JanMitra</title>

    <link rel="stylesheet" href="./css/global.css">

    <link rel="stylesheet" href="./css/auth.css">
</head>

<body>

    <main class="auth-page">

        <section class="auth-brand">

            <div class="brand-mark">
                JM
            </div>

            <h1>
                JanMitra
            </h1>

            <p>
                Citizen intelligence for better
                public development decisions.
            </p>

            <a href="./pages/public.html" class="public-link">
                View Public Development Works
            </a>

        </section>


        <section class="auth-panel">

            <div class="auth-card">

                <div class="auth-header">

                    <p class="eyebrow">
                        PORTAL
                    </p>

                    <h2 id="authTitle">
                        Welcome back
                    </h2>

                    <p id="authSubtitle">
                        Sign in to submit and track
                        your development requests.
                    </p>

                </div>


                <form id="authForm">

                    <label for="email">
                        Email
                    </label>

                    <input id="email" type="email" placeholder="abc@gmail.com" autocomplete="email" required>


                    <label for="password">
                        Password
                    </label>

                    <input id="password" type="password" placeholder="Enter your password"
                        autocomplete="current-password" minlength="6" required>


                    <p id="authError" class="auth-error"></p>


                    <button id="authSubmit" type="submit" class="primary-button">
                        Sign In
                    </button>

                </form>


                <div class="auth-switch">

                    <span id="switchText">
                        New to JanMitra?
                    </span>

                    <button id="switchMode" type="button" class="text-button">
                        Create account
                    </button>

                </div>

            </div>

        </section>

    </main>


    <script type="module" src="./js/auth.js"></script>

</body>

</html>
